services:

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: python run.py
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    depends_on:
      - redis
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DATABASE_URL: sqlite:///app.db

  worker:
    build: .
    command: celery -A app.celery_worker:celery worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DATABASE_URL: sqlite:///app.db